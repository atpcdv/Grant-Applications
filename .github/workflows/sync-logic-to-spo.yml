name: Sync Logic to SPO Knowledge Base
on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'FormScripts/**/*.js'
jobs:
  analyze-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Process Changed JS Files
        env:
          POWER_AUTOMATE_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'FormScripts/**/*.js')
          if [ -z "$CHANGED" ]; then
            echo "No JS files changed."
            exit 0
          fi
 
          for file in $CHANGED; do
            echo "Processing $file..."
            CONTENT=$(cat "$file" | jq -Rs .)
            FILENAME=$(basename "$file")
 
            curl -X POST "$POWER_AUTOMATE_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"filename\": \"$FILENAME\",
                \"content\": $CONTENT,
                \"path\": \"$file\"
              }"
          done